<form [formGroup]="form" class="maker-form-wrapper">
  <div class="row">
    @for (field of fieldDefs; track field.key) {
      @if (field.type === 'date') { 
        <div class="col-12 form-section-label">{{ field.label }}</div>
      } @else {
        <div [class]="field.gridClass || 'col-md-6'">
          <div class="custom-form-group">
            <label [for]="field.key">
              {{ field.label }}
              @if (field.required) { <span class="required-star">*</span> }
            </label>

            @switch (field.type) {
              @case ('select') {
                <select [formControlName]="field.key" [id]="field.key" (change)="handleFieldEvent(field, 'change')">
                  <option value="" disabled selected>Please Select</option>
                  @for (opt of field.options; track opt.value) {
                    <option [value]="opt.value">{{ opt.label }}</option>
                  }
                </select>
              }
              @case ('textarea') {
                <textarea [formControlName]="field.key" [id]="field.key" (blur)="handleFieldEvent(field, 'blur')"></textarea>
              }
              @default {
                <input [type]="field.type === 'number' ? 'text' : field.type"
                       [formControlName]="field.key" 
                       [id]="field.key"
                       [numbersOnly]="field.type === 'number'"
                       (blur)="handleFieldEvent(field, 'blur')">
              }
            }
          </div>
        </div>
      }
    }
  </div>
</form>
