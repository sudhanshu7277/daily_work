server {
    listen 8080;

    include /opt/middleware/nginx/latest/nginx/mime.types;

    # Ensure .mjs files are served with correct MIME type
    types {
        application/javascript mjs;
    }

    gzip on;
    # ... keep your existing gzip_min_length, gzip_types, etc. ...
    text/javascript;

    # ---------------------------------------------------------
    # ADD THIS BLOCK BELOW TO FIX THE ROUTING 404 ISSUE
    # ---------------------------------------------------------
    location /gab/ui/ {
        # This targets the directory where your build assets are mounted
        # Adjust /usr/share/nginx/html if your container uses a different public folder path
        alias /usr/share/nginx/html/; 
        
        # Forces Nginx to redirect deep-linked routes back to your main index.html file
        try_files $uri $uri/ /gab/ui/index.html;
    }
    # ---------------------------------------------------------

    # add Strict-Transport-Security...
    add_header Strict-Transport-Security "max-age=31536000";
}