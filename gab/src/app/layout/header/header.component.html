<header class="gab-header" role="banner">
  <button
    type="button"
    class="gab-header__toggle"
    aria-label="Toggle navigation"
    (click)="toggleSidenav.emit()"
  >
    <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
      <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
    </svg>
  </button>

  <a class="gab-header__brand" routerLink="/dashboard" aria-label="Global Account Bank — home">
    <span class="gab-header__brand-mark" aria-hidden="true">GAB</span>
    <span class="gab-header__brand-text">Global Account Bank</span>
  </a>

  <div class="gab-header__spacer"></div>

  @if (loadingService.isLoading()) {
    <div class="gab-header__loading" aria-live="polite">
      <span class="gab-spinner gab-spinner--sm" aria-hidden="true"></span>
      <span class="gab-sr-only">Loading…</span>
    </div>
  }

  <div class="gab-header__user" *ngIf="user() as u">
    <div class="gab-header__user-avatar" aria-hidden="true">{{ initials(u.name) }}</div>
    <div class="gab-header__user-meta">
      <span class="gab-header__user-name">{{ u.name }}</span>
      <span class="gab-header__user-role">{{ u.role | titlecase }}</span>
    </div>
  </div>
</header>
