<form [formGroup]="searchForm" class="search-form-container">
  <mat-radio-group formControlName="type" class="radio-group">
    <mat-radio-button value="individual">Individual</mat-radio-button>
    <mat-radio-button value="entity">Entity</mat-radio-button>
  </mat-radio-group>
<div class="form-grid">
  @if (searchForm.get('type')?.value === 'individual') {

    <div class="search-row">
  <div class="form-group">
    <label class="input-label">
      {{verbiage.firstName | translate}} <span class="required-star">*</span>
    </label>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <input matInput formControlName="firstName" [placeholder]="verbiage.firstNamePlaceholder">
    </mat-form-field>
  </div>

  <div class="form-group">
    <label class="input-label">
      {{verbiage.middleName | translate}}
    </label>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <input matInput formControlName="middleName" [placeholder]="verbiage.middleNamePlaceholder">
    </mat-form-field>
  </div>

  <div class="form-group">
    <label class="input-label">
      {{verbiage.lastName | translate}} <span class="required-star">*</span>
    </label>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <input matInput formControlName="lastName" [placeholder]="verbiage.lastNamePlaceholder">
    </mat-form-field>
  </div>
</div>
  <!--   <div class="form-field-group">
      <label class="input-label">
        {{searchCustomerVerbiage.lastName | translate}} <span class="required-star">*</span>
      </label>
      <mat-form-field appearance="outline">
        <input matInput formControlName="lastName" [placeholder]="searchCustomerVerbiage.lastName | translate">
      </mat-form-field>
    </div>

    <div class="form-field-group">
      <label class="input-label">
        {{searchCustomerVerbiage.middleName | translate}}
      </label>
      <mat-form-field appearance="outline">
        <input matInput formControlName="middleName" [placeholder]="searchCustomerVerbiage.middleName | translate">
      </mat-form-field>
    </div>
    <div class="form-field-group">
      <label class="input-label">
        {{searchCustomerVerbiage.firstName | translate}} <span class="required-star">*</span>
      </label>
      <mat-form-field appearance="outline">
        <input matInput formControlName="firstName" [placeholder]="searchCustomerVerbiage.firstName | translate">
      </mat-form-field>
    </div> -->
    
  }
</div>
  } @else {
    <mat-form-field appearance="outline">
      <mat-label>Entity / Trade Name</mat-label>
      <input matInput formControlName="entityName" placeholder="Entity Name">
      <mat-hint>*Required</mat-hint>
    </mat-form-field>
  }
    <mat-form-field appearance="outline">
      <mat-label>Phone Number</mat-label>
      <input matInput formControlName="phone" placeholder="###-###-####">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email Address</mat-label>
      <input matInput formControlName="email" placeholder="example@123mail.com">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Responsible Lawyer Email ID</mat-label>
      <input matInput formControlName="lawyerEmail" placeholder="example@bmo.com">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>eDiscovery Project Manager</mat-label>
      <input matInput formControlName="manager" placeholder="Name">
    </mat-form-field>
  </div>

  <div class="advanced-options">
    <span>ADVANCED SEARCH OPTIONS</span>
    <div class="search-form-container">
      <div class="advanced-toggle" (click)="toggleAdvancedSearch()">
        <span class="chevron" [class.open]="isAdvancedSearchOpen"></span>
        ADVANCED SEARCH OPTIONS
      </div>
    
      <div class="advanced-section" *ngIf="isAdvancedSearchOpen">
        <div class="form-row">
          <!-- <div class="form-group full-width">
            <label>Country</label>
            <select class="custom-select">
              <option value="Canada">Canada</option>
              </select>
          </div> -->
          <div class="form-group">
            <label>Country</label>
            <div class="select-wrapper">
              <select class="custom-select">
                <option value="Canada">Canada</option>
                <option value="USA">United States</option>
              </select>
            </div>
          </div>
        </div>
    
        <div class="form-row three-cols">
          <div class="form-group">
            <label>Street Number</label>
            <input type="text" placeholder="#####" />
          </div>
          <div class="form-group">
            <label>Street Name</label>
            <input type="text" placeholder="Street Name" />
          </div>
          <div class="form-group">
            <label>Unit Number</label>
            <input type="text" placeholder="####" />
          </div>
        </div>
    
        <div class="form-row three-cols">
          <div class="form-group">
            <label>Province/Territory</label>
            <select class="custom-select">
              <option value="">Select</option>
            </select>
          </div>
          <div class="form-group">
            <label>City/Town</label>
            <input type="text" placeholder="City/Town" />
          </div>
          <div class="form-group">
            <label>Postal Code</label>
            <input type="text" placeholder="XXX XXX" />
          </div>
        </div>
    
        <div class="form-row three-cols">
          <!-- <div class="form-group">
            <label>Date of Birth</label>
            <div class="date-input-wrapper">
              <input type="text" placeholder="Select" />
              <span class="calendar-icon"></span>
            </div>
            <small class="helper-text">MM/DD/YYYY</small>
          </div> -->
          <div class="form-field-group date-picker-group">
            <label for="dateOfBirth" class="field-label">Date of Birth</label>
            
            <div class="date-input-wrapper">
              <input type="date" 
                     id="dateOfBirth"
                     class="custom-date-input"
                     placeholder="Select"
                     formControlName="dateOfBirth">
                     
              <span class="custom-calendar-icon"></span>
            </div>
            
            <small class="helper-text">MM/DD/YYYY</small>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" placeholder="###-###-####" />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="example@123mail.com" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="form-actions">
    <button type="button" class="clear-text-btn" (click)="onClear()">CLEAR SEARCH</button>
    <button type="submit" class="search-pill-btn" (click)="onSearch()" [disabled]="searchForm.invalid">
      SEARCH
    </button>
  </div>
</form>
