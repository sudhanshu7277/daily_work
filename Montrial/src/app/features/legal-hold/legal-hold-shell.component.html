<div class="app-layout">
  <div class="content-column">
    <div class="tab-heading">
      <h2>Manage legal hold</h2>
    </div>

    <nav class="tab-header">
      <button [class.active]="currentTab === 'customer'" (click)="currentTab = 'customer'">Search by Customer</button>
      <button [class.active]="currentTab === 'product'" (click)="currentTab = 'product'">Search by Product</button>
      <button [class.active]="currentTab === 'hold'" (click)="currentTab = 'hold'">Search by Legal Hold</button>
    </nav>

    <div class="search-section">
      <app-search-customer *ngIf="currentTab === 'customer'" (searchTriggered)="onSearch($event)"></app-search-customer>
      </div>

    <app-results-grid (selectionChanged)="handleSelectionChange($event)"></app-results-grid>
  </div>

  <div class="sidebar-column">
    <app-selection-panel 
      [selectedProfiles]="selectedList" 
      (removeProfile)="handleRemoveProfile($event)">
    </app-selection-panel>
  </div>
</div>
