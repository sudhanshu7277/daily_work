<div class="results-grid-wrapper">
  <div class="results-filter-row">
    <span class="filter-title">Search result filter</span>

    <select
      class="filter-select"
      [(ngModel)]="pendingColumnToShow"
      aria-label="Select a column to show"
    >
      <option value="">Select</option>
      @for (filter of hiddenFilters; track filter.id) {
        <option [value]="filter.id">{{ filter.label }}</option>
      }
    </select>

    <button type="button" class="filter-add-btn" (click)="addPendingFilter()" [disabled]="!pendingColumnToShow">
      ADD
    </button>
  </div>

  <div class="results-showing-row">
    <span class="showing-label">Showing:</span>

    <div class="showing-chips">
      @for (filter of activeFilters; track filter.id) {
        <div class="filter-chip">
          <span>{{ filter.label }}</span>
          <button type="button" (click)="removeFilter(filter.id)" aria-label="Remove {{ filter.label }}">
            ×
          </button>
        </div>
      }

      <button type="button" class="reset-btn" (click)="resetFilters()">RESET</button>
    </div>
  </div>

  <ag-grid-angular
    class="ag-theme-alpine results-ag-grid"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [rowSelection]="rowSelection"
    [rowHeight]="54"
    [headerHeight]="50"
    [getRowId]="getRowId"
    [getRowClass]="getRowClass"
    [suppressRowClickSelection]="true"
    [animateRows]="false"
    (gridReady)="onGridReady($event)"
    (cellClicked)="onCellClicked($event)"
    (rowSelected)="onRowSelected($event)"
  ></ag-grid-angular>
</div>
