<div class="csg-container">

  <!-- Loading / error overlay -->
  <div class="grid-overlay" [class.grid-overlay--hidden]="!isLoading && !loadError">
    <ng-container *ngIf="isLoading">
      <div class="spinner"></div>
      <span>Loading...</span>
    </ng-container>
    <ng-container *ngIf="loadError && !isLoading">
      <span class="grid-overlay__error">Failed to load data.</span>
      <button (click)="loadData()">Retry</button>
    </ng-container>
  </div>

  <!--
    AG Grid v32
    ▸ No rowSelection binding — omitting it entirely prevents AG Grid from
      activating its internal selection model or rendering a selection column.
    ▸ All deprecated v28 props (checkboxSelection, suppressRowClickSelection,
      suppressMultiRangeSelection) are intentionally absent — they are ignored
      in v32 and were causing the phantom empty column.
  -->
  <ag-grid-angular
    class="ag-theme-alpine csg-grid"
    [class.grid--hidden]="isLoading || loadError"
    style="width: 100%; height: calc(100% - 52px);"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [rowHeight]="52"
    [headerHeight]="44"
    [suppressCellFocus]="true"
    [animateRows]="false"
    [getRowClass]="getRowClass"
    (gridReady)="onGridReady($event)">
  </ag-grid-angular>

  <!-- Custom pagination bar -->
  <div class="cs-pagination" [class.grid--hidden]="isLoading || loadError">

    <div class="cs-pagination__left">
      <span class="cs-pg-count">{{ paginationFrom }}-{{ paginationTo }} of {{ totalRows }}</span>
      <span class="cs-pg-label">Items per page</span>
      <select class="cs-pg-select"
              [(ngModel)]="pageSize"
              (ngModelChange)="onPageSizeChange()">
        <option *ngFor="let opt of pageSizeOpts" [ngValue]="opt">{{ opt }}</option>
      </select>
    </div>

    <div class="cs-pagination__right">

      <button class="cs-pg-nav"
              [class.cs-pg-nav--disabled]="currentPage === 1"
              (click)="goPage(currentPage - 1)">
        <svg width="6" height="10" viewBox="0 0 6 10" fill="none">
          <path d="M5 1L1 5l4 4" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Previous
      </button>

      <ng-container *ngFor="let p of pageNumbers">
        <span   *ngIf="p !== '…' && +p === currentPage" class="cs-pg-active">{{ p }}</span>
        <button *ngIf="p !== '…' && +p !== currentPage" class="cs-pg-num"
                (click)="goPage(+p)">{{ p }}</button>
        <span   *ngIf="p === '…'" class="cs-pg-dots">...</span>
      </ng-container>

      <button class="cs-pg-nav"
              [class.cs-pg-nav--disabled]="currentPage === totalPages"
              (click)="goPage(currentPage + 1)">
        Next
        <svg width="6" height="10" viewBox="0 0 6 10" fill="none">
          <path d="M1 1l4 4-4 4" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

    </div>
  </div>

  <!--PAGINATION FOR AG-GRID HTML BELOW  -->
  <!-- Pagination bar — Figma exact
     Left:  1-10 of 100  Items per page  [10 ▾]
     Right: ‹ Previous  1  2  3  4  5  ...  10  Next ›  -->
<div class="cs-pagination" [class.grid--hidden]="isLoading || loadError">

  <div class="cs-pagination__left">
    <span class="cs-pg-count">{{ paginationFrom }}-{{ paginationTo }} of {{ totalRows }}</span>
    <span class="cs-pg-label">Items per page</span>
    <select class="cs-pg-select"
            [(ngModel)]="pageSize"
            (ngModelChange)="onPageSizeChange()">
      <option *ngFor="let opt of pageSizeOpts" [ngValue]="opt">{{ opt }}</option>
    </select>
  </div>

  <div class="cs-pagination__right">

    <button class="cs-pg-nav"
            [class.cs-pg-nav--disabled]="currentPage === 1"
            (click)="goPage(currentPage - 1)">
      <svg class="cs-pg-chevron" viewBox="0 0 8 14" fill="none">
        <path d="M7 1L1 7l6 6" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Previous
    </button>

    <ng-container *ngFor="let p of pageNumbers">
      <span   *ngIf="p !== '...' && +p === currentPage" class="cs-pg-active">{{ p }}</span>
      <button *ngIf="p !== '...' && +p !== currentPage" class="cs-pg-num"
              (click)="goPage(+p)">{{ p }}</button>
      <span   *ngIf="p === '...'" class="cs-pg-dots">...</span>
    </ng-container>

    <button class="cs-pg-nav"
            [class.cs-pg-nav--disabled]="currentPage === totalPages"
            (click)="goPage(currentPage + 1)">
      Next
      <svg class="cs-pg-chevron" viewBox="0 0 8 14" fill="none">
        <path d="M1 1l6 6-6 6" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

  </div>
</div>
<!--END OF PAGINATION FOR AG-GRID HTML-->

</div>
