<form *ngIf="tasks?.length" [formGroup]="customerSearchForm" class="mb-2u">
    <fdc-row class="mt-4u">
      <div class="col-12">
        <h3 class="body-1-bold mb-2u">
          {{ 'customerSearch.form.caseSearchHeader' | translate }}
        </h3>
        <p class="body-2-regular mb-2u text-muted">
          {{ 'customerSearch.form.caseSearchSubtext' | translate }}
        </p>
      </div>
    </fdc-row>
  
    <fdc-row>
      <fdc-grid width="50" class="mt-2u">
        <fdc-input
          [type]="'text'"
          [maxLength]="20"
          formControlName="caseId"
          [label]="'customerSearch.form.caseId.label' | translate"
          [errorMessages]="fnErrorMessages">
        </fdc-input>
      </fdc-grid>
    </fdc-row>
  
    <fdc-row class="mt-4u">
      <div class="col-12 d-flex justify-content-end gap-2u">
        <button fdc-button type="button" variant="secondary" (click)="clearSearch()">
          {{ 'customerSearch.form.clearSearch' | translate }}
        </button>
        <button fdc-button type="button" variant="primary" (click)="searchCustomer()">
          {{ 'customerSearch.form.search' | translate }}
        </button>
      </div>
    </fdc-row>
  </form>
