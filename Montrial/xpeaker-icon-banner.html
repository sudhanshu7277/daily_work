<!-- BMO Info Banner -->
<div class="bmo-info-banner">
  
  <div class="bmo-info-banner__left-content">
    <!-- Announcement Icon using CSS Mask with $bmo-blue -->
    <span class="bmo-info-icon-announcement" aria-hidden="true"></span>
    
    <!-- Text Section -->
    <div class="bmo-info-text-group">
      <span class="bmo-info-title">Check the History tab for Legal Hold status</span>
      <span class="bmo-info-description">Check the status of processing Legal Holds in the History tab</span>
    </div>
  </div>

  <!-- Right Close Button -->
  <button type="button" class="bmo-info-close-btn" aria-label="Close message">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>

</div>
